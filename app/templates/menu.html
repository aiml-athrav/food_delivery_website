{% extends "base.html" %}

{% block content %}
<div class="container my-5 py-4">
    <!-- Page Header -->
    <div class="text-center mb-5 fade-in-up">
        <h1 class="display-4 fw-bold text-dark">Our <span class="text-warning">Menu</span></h1>
        <p class="text-muted fs-5">Choose from our wide variety of delicious, freshly prepared options.</p>
    </div>

    <!-- Grid for Food Items -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

        <!-- Loop through each food item passed from routes.py -->
        {% for item in items %}
        <div class="col">
            <!-- Menu Item Card -->
            <div class="card h-100 shadow-sm border-0 menu-card rounded-4 overflow-hidden">
                <!-- Food Image -->
                <img src="{{ item.image_url }}" class="card-img-top object-fit-cover" alt="{{ item.name }}"
                    style="height: 250px;">

                <div class="card-body d-flex flex-column p-4">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <!-- Food Name -->
                        <h5 class="card-title fw-bold mb-0 fs-4">{{ item.name }}</h5>
                        <!-- Price Badge -->
                        <span class="badge bg-warning text-dark fs-6 rounded-pill px-3 py-2">${{
                            "%.2f"|format(item.price) }}</span>
                    </div>

                    <!-- Food Description -->
                    <p class="card-text text-muted flex-grow-1">{{ item.description }}</p>

                    <!-- Add to Cart Form -->
                    <form action="{{ url_for('add_to_cart', item_id=item.id) }}" method="POST" class="mt-3">
                        <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 fw-semibold add-to-cart-btn">
                            <i class="fas fa-cart-plus me-2"></i> Add to Cart
                        </button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}

    </div>
</div>
{% endblock %}
