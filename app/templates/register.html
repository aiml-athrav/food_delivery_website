{% extends "base.html" %}

{% block content %}
<div class="container my-5 py-4 fade-in-up">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Create an Account</h2>
                        <p class="text-muted">Join us to start ordering delicious food!</p>
                    </div>

                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control form-control-lg rounded-3" id="username"
                                name="username" required placeholder="Choose a username">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email address</label>
                            <input type="email" class="form-control form-control-lg rounded-3" id="email" name="email"
                                required placeholder="name@example.com">
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control form-control-lg rounded-3" id="password"
                                name="password" required placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn btn-warning btn-lg w-100 rounded-pill fw-bold text-dark mb-3">
                            Register
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="mb-0 text-muted">Already have an account? <a href="{{ url_for('login') }}"
                                class="text-warning fw-semibold text-decoration-none">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
