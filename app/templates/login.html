{% extends "base.html" %}

{% block content %}
<div class="container my-5 py-4 fade-in-up">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Please login to your account</p>
                    </div>

                    <form action="{{ url_for('login') }}" method="POST">
                        <!-- Email Input -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email address</label>
                            <input type="email" class="form-control form-control-lg rounded-3" id="email" name="email"
                                required placeholder="name@example.com">
                        </div>

                        <!-- Password Input -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control form-control-lg rounded-3" id="password"
                                name="password" required placeholder="••••••••">
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-warning btn-lg w-100 rounded-pill fw-bold text-dark mb-3">
                            Login
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('register') }}"
                                class="text-warning fw-semibold text-decoration-none">Sign up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
