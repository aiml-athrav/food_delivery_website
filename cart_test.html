<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - CraveBite</title>
    <!-- Bootstrap CSS for responsive layout and styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS (app/static/css/style.css) -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Font Awesome for Icons (like the cart and user icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!-- Main Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <!-- Brand Logo -->
            <a class="navbar-brand fw-bold text-warning" href="/">
                <i class="fas fa-utensils"></i> CraveBite
            </a>

            <!-- Mobile Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="target"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/menu">Menu</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <!-- Cart Link with Badge -->
                    <li class="nav-item">
                        <a class="nav-link" href="/cart">
                            <i class="fas fa-shopping-cart"></i> Cart
                            <span class="badge bg-warning text-dark rounded-pill">1</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-warning text-dark ms-2 fw-semibold px-3 rounded-pill"
                            href="/register">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Flash Messages (Displays alerts like "Login Successful" or "Item added to cart") -->
    <div class="container mt-3">
        
        
        
        <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            Classic Burger added to cart!
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        
        
    </div>

    <!-- Main Content Area: Other HTML files will push their content here -->
    <main>
        
<div class="container my-5 py-4 fade-in-up">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Your Cart</h2>
        <a href="/menu" class="btn btn-outline-dark rounded-pill">Continue Shopping</a>
    </div>

    <div class="row">
        <!-- Cart Items List (Left Side) -->
        <div class="col-lg-8">
            
            
            <div class="card shadow-sm border-0 rounded-4 mb-3">
                <div class="card-body p-3 d-flex align-items-center">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&amp;w=600&amp;auto=format&amp;fit=crop" alt="Classic Burger" class="rounded-3 object-fit-cover me-3"
                        style="width: 80px; height: 80px;">
                    <div class="flex-grow-1">
                        <h5 class="fw-bold mb-1">Classic Burger</h5>
                        <p class="text-muted mb-0">$8.99 each</p>
                    </div>

                    <!-- Update Quantity Form -->
                    <form action="/update_cart/1" method="POST"
                        class="d-flex align-items-center mx-3 gap-2">
                        <input type="number" name="quantity" value="1" min="1"
                            class="form-control text-center" style="width: 70px;">
                        <button type="submit" class="btn btn-sm btn-outline-dark" title="Update Quantity"><i
                                class="fas fa-sync-alt"></i></button>
                    </form>

                    <div class="fw-bold fs-5 me-3">
                        $8.99
                    </div>

                    <!-- Remove Item Form -->
                    <form action="/remove_from_cart/1" method="POST">
                        <button type="submit" class="btn btn-sm btn-danger rounded-circle" title="Remove"><i
                                class="fas fa-times"></i></button>
                    </form>
                </div>
            </div>
            
            
        </div>

        <!-- Order Summary (Right Side) -->
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 rounded-4 bg-light position-sticky" style="top: 100px;">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Order Summary</h4>
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Items (1)</span>
                        <span>$8.99</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 text-muted border-bottom pb-3">
                        <span>Delivery Fee</span>
                        <span>$0.00 <!-- Free delivery for this project! --></span>
                    </div>
                    <div class="d-flex justify-content-between mb-4 mt-3">
                        <span class="fs-5 fw-bold">Total</span>
                        <span class="fs-5 fw-bold text-dark">$8.99</span>
                    </div>

                    
                    <form action="/checkout" method="POST">
                        <button type="submit"
                            class="btn btn-warning w-100 py-3 rounded-pill fw-bold text-dark fs-5 shadow-sm">
                            Checkout
                        </button>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>

    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 CraveBite Delivery. Academic Project Simulation.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle (Required for Navbar and Alerts to work) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/script.js"></script>
</body>

</html>
